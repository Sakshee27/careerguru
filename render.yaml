services:
  - type: web
    name: careerguru
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app3.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GOOGLE_API_KEY
        sync: false      # set this in the Render dashboard (Environment)
      - key: DATABASE_URL
        sync: false      # set this in the Render dashboard (Environment)
